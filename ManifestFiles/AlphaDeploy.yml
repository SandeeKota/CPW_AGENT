apiVersion: apps/v1
kind: Deployment
metadata:
  name: "cpw-dashboard"
  namespace: cpw-alpha
spec:
  selector:
    matchLabels:
      app: "dashboard"
  replicas: 1
  template:
    metadata:
      labels:
        app: "dashboard"
    spec:
      containers:
        - name: "dashboard"
          imagePullPolicy: Always
          image: thewayfarerscotainerregistry.azurecr.io/cpw-dashboard:alpha-${GITHUB_RUN_NUMBER}
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
